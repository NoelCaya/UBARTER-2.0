<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer gold circle -->
  <circle cx="100" cy="100" r="95" fill="#f5c518"/>
  
  <!-- Maroon border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#7b0f10" stroke-width="2"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#7b0f10" stroke-width="1.5"/>
  
  <!-- Center maroon circle -->
  <circle cx="100" cy="100" r="50" fill="#7b0f10"/>
  
  <!-- Center gold accent -->
  <circle cx="100" cy="100" r="40" fill="#f5c518"/>
  
  <!-- UB text -->
  <text x="100" y="115" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#7b0f10">UB</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#7b0f10" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
</svg>
